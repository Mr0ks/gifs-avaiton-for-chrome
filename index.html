<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aviation Gifs</title>
  <link rel="icon" type="image/png" href="icon.png" />

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
    }

    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    #heroContent {
      position: absolute;
      inset: 0;
    }

    .hero img {
      width: 100%;
      height: 120%;
      object-fit: cover;
      position: absolute;
    }

    .hero-text {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 40px;
      font-weight: bold;
      z-index: 10;
    }

    .gallery {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .image-card img {
      width: 100%;
      border-radius: 20px;
      cursor: pointer;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal.open { display: flex; }

    .modal img {
      max-width: 90%;
      max-height: 90%;
    }

    .download-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: white;
      color: black;
      padding: 10px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div id="heroContent">Loading...</div>
    <div class="hero-text">Aviation Gifs</div>
  </div>

  <div class="gallery" id="gallery"></div>

  <div class="modal" id="modal">
    <a id="downloadBtn" class="download-btn" download>Download</a>
    <img id="modalImage">
  </div>

<script>

const FILES = [
  'dubai.png',
  'a320neo takeoff.gif',
  '777x.gif'
];

const heroContent = document.getElementById('heroContent');
const gallery = document.getElementById('gallery');
const modal = document.getElementById('modal');
const modalImage = document.getElementById('modalImage');
const downloadBtn = document.getElementById('downloadBtn');

function setHero(src) {
  heroContent.innerHTML = `<img id="heroImage" src="${src}">`;
}

function createImage(src) {
  const div = document.createElement('div');
  div.className = 'image-card';
  div.innerHTML = `<img src="${src}">`;

  div.onclick = () => {
    modal.classList.add('open');
    modalImage.src = src;
    downloadBtn.href = src;
  };

  return div;
}

modal.onclick = () => modal.classList.remove('open');

function load() {
  if (!FILES.length) return;

  setHero(FILES[0]);

  FILES.forEach(file => {
    gallery.appendChild(createImage(file));
  });
}

window.addEventListener('scroll', () => {
  const img = document.getElementById('heroImage');
  if (img) {
    img.style.transform = `translateY(${window.scrollY * 0.4}px)`;
  }
});

load();

</script>

</body>
</html>
