<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save these gifs</title>
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }
    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      background: #000;
    }
    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.75);
      font-size: 20px;
    }
    .hero-gradient {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 220px;
      background: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0.7), rgba(0,0,0,0));
    }
    .hero-text {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(0px);
      z-index: 20;
      text-align: center;
      padding: 0 16px;
      pointer-events: none;
      transition: transform 0.08s linear;
      width: 100%;
      max-width: 900px;
    }
    .hero-text h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 700;
      text-shadow: 0 4px 18px rgba(0,0,0,0.45);
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }
    .status {
      margin-bottom: 24px;
      padding: 14px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8);
      font-size: 14px;
    }
    .error {
      background: rgba(255, 80, 80, 0.12);
      border-color: rgba(255, 120, 120, 0.28);
      color: #ffd2d2;
    }
    .gallery {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    .image-card {
      position: relative;
      display: block;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .image-card:hover {
      transform: scale(1.01);
      border-color: rgba(255,255,255,0.25);
    }
    .image-card img {
      width: 100%;
      display: block;
    }
    .card-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 18px;
      background: linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0));
    }
    .card-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 6px;
    }
    .card-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      margin: 0;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 999;
    }
    .modal.open {
      display: flex;
    }
    .modal-content {
      width: 100%;
      max-width: 1200px;
      max-height: 95vh;
      overflow: hidden;
      border-radius: 28px;
      background: #0a0a0a;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .modal-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }
    .modal-path {
      margin: 4px 0 0;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      word-break: break-all;
    }
    .close-btn {
      background: transparent;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
    }
    .modal-body {
      max-height: calc(95vh - 74px);
      overflow: auto;
      background: #000;
    }
    .modal-body img {
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div id="heroContent" class="hero-placeholder">Loading images...</div>
    <div class="hero-gradient"></div>
    <div class="hero-text" id="heroText">
      <h1>Save these gifs</h1>
    </div>
  </section>

  <main class="container">
    <div id="status" class="status">Checking your GitHub repo for image files...</div>
    <div id="gallery" class="gallery"></div>
  </main>

  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <p id="modalTitle" class="modal-title"></p>
          <p id="modalPath" class="modal-path"></p>
        </div>
        <button id="closeBtn" class="close-btn">Close</button>
      </div>
      <div class="modal-body">
        <img id="modalImage" src="" alt="" />
      </div>
    </div>
  </div>

  <script>
    const CONFIG = {
      owner: 'Mr0ks',
      repo: 'gifs-avaiton-for-chrome',
      branch: 'main',
      path: '',
      featuredImage: 'dubai.png',
      title: 'Save these gifs'
    };

    const imageExtensions = ['.png', '.jpg', '.jpeg', '.gif', '.webp', '.bmp', '.svg', '.avif'];

    const heroContent = document.getElementById('heroContent');
    const statusBox = document.getElementById('status');
    const gallery = document.getElementById('gallery');
    const modal = document.getElementById('modal');
    const modalImage = document.getElementById('modalImage');
    const modalTitle = document.getElementById('modalTitle');
    const modalPath = document.getElementById('modalPath');
    const closeBtn = document.getElementById('closeBtn');
    const heroText = document.getElementById('heroText');

    function isImageFile(name = '') {
      const lower = name.toLowerCase();
      return imageExtensions.some(ext => lower.endsWith(ext));
    }

    function getRawUrl(filePath) {
      return `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${filePath}`;
    }

    function getApiUrl(path = '') {
      const cleanPath = path ? `/${path}` : '';
      return `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents${cleanPath}?ref=${CONFIG.branch}`;
    }

    async function fetchRepoImages(path = '') {
      const response = await fetch(getApiUrl(path));

      if (!response.ok) {
        throw new Error('Could not read this GitHub repo. Check username, repo, branch, and make sure the repo is public.');
      }

      const items = await response.json();
      const list = Array.isArray(items) ? items : [items];
      let found = [];

      for (const item of list) {
        if (item.type === 'file' && isImageFile(item.name)) {
          found.push({
            name: item.name,
            path: item.path,
            url: getRawUrl(item.path)
          });
        }

        if (item.type === 'dir') {
          const nested = await fetchRepoImages(item.path);
          found = found.concat(nested);
        }
      }

      return found;
    }

    function setHero(image) {
      if (!image) {
        heroContent.className = 'hero-placeholder';
        heroContent.textContent = 'No images found in this repo.';
        return;
      }

      heroContent.className = '';
      heroContent.innerHTML = `<img src="${image.url}" alt="${image.name}">`;
    }

    function createCard(image) {
      const card = document.createElement('div');
      card.className = 'image-card';
      const isGif = image.name.toLowerCase().endsWith('.gif');
      card.innerHTML = `
        <img src="${image.url}" alt="${image.name}" loading="lazy">
        <div class="card-overlay">
          <p class="card-title">${image.name}</p>
          <p class="card-subtitle">${isGif ? 'GIF found • click to view' : 'Click to view'}</p>
        </div>
      `;
      card.addEventListener('click', () => openModal(image));
      return card;
    }

    function openModal(image) {
      modalImage.src = image.url;
      modalImage.alt = image.name;
      modalTitle.textContent = image.name;
      modalPath.textContent = image.path;
      modal.classList.add('open');
    }

    function closeModal() {
      modal.classList.remove('open');
    }

    closeBtn.addEventListener('click', closeModal);

    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      const moveDown = Math.min(scrollY * 0.18, 90);
      const scale = Math.max(1 - scrollY * 0.00035, 0.88);
      heroText.style.transform = `translateX(-50%) translateY(${moveDown}px) scale(${scale})`;
      heroText.style.opacity = `${Math.max(1 - scrollY * 0.0012, 0.5)}`;
    });
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    async function loadImages() {
      try {
        statusBox.className = 'status';
        statusBox.textContent = 'Checking your GitHub repo for image files...';

        const images = await fetchRepoImages(CONFIG.path);

        images.sort((a, b) => {
          if (a.name.toLowerCase() === CONFIG.featuredImage.toLowerCase()) return -1;
          if (b.name.toLowerCase() === CONFIG.featuredImage.toLowerCase()) return 1;
          return a.name.localeCompare(b.name);
        });

        setHero(images[0] || null);
        gallery.innerHTML = '';

        if (!images.length) {
          statusBox.textContent = 'No image files were found in this repo.';
          return;
        }

        const gifCount = images.filter(image => image.name.toLowerCase().endsWith('.gif')).length;
        statusBox.textContent = `Found ${images.length} image file${images.length === 1 ? '' : 's'} in this GitHub repo, including ${gifCount} GIF${gifCount === 1 ? '' : 's'}.`;

        images.forEach(image => {
          gallery.appendChild(createCard(image));
        });
      } catch (error) {
        statusBox.className = 'status error';
        statusBox.textContent = error.message || 'Something went wrong.';
        setHero(null);
      }
    }

    loadImages();
  </script>
</body>
</html>
